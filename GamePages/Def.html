<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Html & CSS Quiz</title>
<link rel="stylesheet" href="../GameCSS/def.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="../Assets/video/crystal.mp4" type="video/mp4">
</video>

<div id="home-screen" class="home-screen">
  <h1>🌑 HTML and CSS Cavern 🌑</h1>
  <p>Answer correctly to conquer all grueling 50 rooms and earn the key...</p>
  <button class="btn" onclick="startGame()">Start Adventure</button>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-box">
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  </div>
</div>


<script>

const quiz = [
  // 1
  {
    q: "1. Which HTML tag is used to define a section that contains navigation links?",
    a: ["<nav>","<section>","<header>","<footer>"],
    correct: 0,
    explanation: "<nav> is used for navigation links."
  },
  // 2
  {
    q: "2. Which attribute is used to link an external CSS file?",
    a: ["src","href","link","style"],
    correct: 1,
    explanation: "`href` specifies the path of the external CSS file in <link> tag."
  },
  // 3 input
  {
    q: "3. Write the HTML tag used to create a table row:",
    input: true,
    correctInput: "tr",
    explanation: "<tr> defines a table row."
  },
  // 4
  {
    q: "4. Which property is used to control the space between letters in CSS?",
    a: ["letter-spacing","word-spacing","text-indent","line-height"],
    correct: 0,
    explanation: "`letter-spacing` adjusts spacing between characters."
  },
  // 5 input
  {
    q: "5. Write the CSS property to make text bold:",
    input: true,
    correctInput: "font-weight",
    explanation: "`font-weight: bold;` makes text bold."
  },
  // 6
  {
    q: "6. Which HTML tag is used for inserting a line break?",
    a: ["<break>","<lb>","<br>","<hr>"],
    correct: 2,
    explanation: "<br> inserts a line break."
  },
  // 7 input
  {
    q: "7. Write the CSS property to change the background color of an element:",
    input: true,
    correctInput: "background-color",
    explanation: "`background-color` sets element's background color."
  },
  // 8
  {
    q: "8. Which HTML tag is used to define an unordered list?",
    a: ["<ul>","<ol>","<li>","<list>"],
    correct: 0,
    explanation: "<ul> defines an unordered (bulleted) list."
  },
  // 9 input
  {
    q: "9. Write the CSS property to remove bullets from a list:",
    input: true,
    correctInput: "list-style-type",
    explanation: "`list-style-type: none;` removes bullets."
  },
  // 10
  {
    q: "10. Which HTML attribute is used to specify inline CSS styles?",
    a: ["style","class","id","css"],
    correct: 0,
    explanation: "The `style` attribute applies inline CSS to an element."
  },
  // 11 input
  {
    q: "11. Write the HTML tag to embed an image:",
    input: true,
    correctInput: "img",
    explanation: "<img> is used to embed images."
  },
  // 12 input
  {
    q: "12. Write the HTML attribute used to provide alternative text for images:",
    input: true,
    correctInput: "alt",
    explanation: "The `alt` attribute provides alternative text for images."
  },
  // 13
  {
    q: "13. Which CSS property is used to change the font of an element?",
    a: ["text-font","font-family","font-style","font-weight"],
    correct: 1,
    explanation: "`font-family` sets the font type."
  },
  // 14
  {
    q: "14. Which HTML element defines the main heading of a page?",
    a: ["<h1>","<title>","<header>","<h6>"],
    correct: 0,
    explanation: "<h1> is used for main headings."
  },
  // 15 input
  {
    q: "15. Write the CSS property to center text horizontally:",
    input: true,
    correctInput: "text-align",
    explanation: "`text-align: center;` centers text."
  },
  // 16
  {
    q: "16. Which HTML tag is used to create a clickable link?",
    a: ["<link>","<a>","<href>","<button>"],
    correct: 1,
    explanation: "<a> defines a hyperlink."
  },
  // 17 input
  {
    q: "17. Write the CSS property to set the width of an element:",
    input: true,
    correctInput: "width",
    explanation: "`width` sets element width."
  },
  // 18 input
  {
    q: "18. Write the CSS property to create a rounded corner:",
    input: true,
    correctInput: "border-radius",
    explanation: "`border-radius` sets rounded corners."
  },
  // 19
  {
    q: "19. Which HTML tag is used to define a footer?",
    a: ["<bottom>","<footer>","<section>","<aside>"],
    correct: 1,
    explanation: "<footer> defines a page footer."
  },
  // 20
  {
    q: "20. Which CSS property changes the color of text?",
    a: ["text-color","font-color","color","foreground-color"],
    correct: 2,
    explanation: "`color` sets the text color."
  },
  // 21 input
  {
    q: "21. Write the HTML tag used for numbered lists:",
    input: true,
    correctInput: "ol",
    explanation: "<ol> creates an ordered list."
  },
  // 22 input
  {
    q: "22. Write the CSS property to hide an element without removing it from layout:",
    input: true,
    correctInput: "visibility",
    explanation: "`visibility: hidden;` hides element but keeps layout space."
  },
  // 23
  {
    q: "23. Which attribute specifies the row span of a table cell?",
    a: ["colspan","rowspan","cellspan","span"],
    correct: 1,
    explanation: "`rowspan` defines how many rows a cell spans."
  },
  // 24
  {
    q: "24. Which CSS property adds space inside an element?",
    a: ["margin","padding","border","spacing"],
    correct: 1,
    explanation: "`padding` adds space inside element boundaries."
  },
  // 25 input
  {
    q: "25. Write the HTML attribute used to give an element a unique identifier:",
    input: true,
    correctInput: "id",
    explanation: "`id` uniquely identifies an HTML element."
  },
  // 26 input
  {
    q: "26. Write the HTML attribute used to assign a class to an element:",
    input: true,
    correctInput: "class",
    explanation: "`class` assigns a class name."
  },
  // 27
  {
    q: "27. Which CSS property sets the distance outside an element?",
    a: ["margin","padding","border-spacing","gap"],
    correct: 0,
    explanation: "`margin` sets spacing outside an element."
  },
  // 28 input
  {
    q: "28. Write the HTML tag used to define a table header cell:",
    input: true,
    correctInput: "th",
    explanation: "th defines a table header cell."
  },
  // 29
  {
    q: "29. Which CSS property sets the type of list bullets?",
    a: ["list-style-type","bullet-type","marker-style","list-type"],
    correct: 0,
    explanation: "`list-style-type` sets bullet style."
  },
  // 30 input
  {
    q: "30. Write the HTML tag to insert a horizontal line:",
    input: true,
    correctInput: "hr",
    explanation: "hr inserts a horizontal line."
  },
  // 31
  {
    q: "31. Which HTML tag is used for inline text styling (italic)?",
    a: ["<i>","<b>","<em>","<strong>"],
    correct: 0,
    explanation: "i italicizes text inline."
  },
  // 32 input
  {
    q: "32. Write the CSS property to make text uppercase:",
    input: true,
    correctInput: "text-transform",
    explanation: "`text-transform: uppercase;` makes text uppercase."
  },
  // 33 input
  {
    q: "33. Write the CSS property to control element opacity:",
    input: true,
    correctInput: "opacity",
    explanation: "`opacity` controls transparency (0-1)."
  },
  // 34
  {
    q: "34. Which HTML tag is used to define a definition list?",
    a: ["<dl>","<ul>","<ol>","<list>"],
    correct: 0,
    explanation: "<dl> is used for definition lists."
  },
  // 35 input
  {
    q: "35. Write the CSS property for adding shadow to text:",
    input: true,
    correctInput: "text-shadow",
    explanation: "`text-shadow` adds shadow to text."
  },
  // 36 input
  {
    q: "36. Write the CSS property to fix an element at the top of viewport:",
    input: true,
    correctInput: "position",
    explanation: "`position: fixed;` keeps element at viewport position."
  },
  // 37
  {
    q: "37. Which HTML element is used for emphasized text?",
    a: ["<i>","<em>","<strong>","<b>"],
    correct: 1,
    explanation: "<em> emphasizes text semantically."
  },
  // 38 input
  {
    q: "38. Write the CSS property to set a gradient background:",
    input: true,
    correctInput: "background-image",
    explanation: "`background-image: linear-gradient(...);` sets gradient."
  },
  // 39 input
  {
    q: "39. Write the HTML tag to define a form:",
    input: true,
    correctInput: "form",
    explanation: "<form> defines a form element."
  },
  // 40
  {
    q: "40. Which HTML input type allows multiple files?",
    a: ["file","multiple","file-multiple","multi-file"],
    correct: 0,
    explanation: "`input type='file'` allows files; add `multiple` attribute to select many."
  },
  // 41 input
  {
    q: "41. Write the CSS property to change element display to block:",
    input: true,
    correctInput: "display",
    explanation: "`display: block;` makes element block-level."
  },
  // 42
  {
    q: "42. Which HTML tag contains metadata about a document?",
    a: ["<head>","<meta>","<body>","<header>"],
    correct: 0,
    explanation: "<head> contains metadata like title, meta, links."
  },
  // 43 input
  {
    q: "43. Write the CSS property to float an element left:",
    input: true,
    correctInput: "float",
    explanation: "`float: left;` positions element to the left."
  },
  // 44 input
  {
    q: "44. Write the CSS property to make a grid layout:",
    input: true,
    correctInput: "display",
    explanation: "`display: grid;` creates a grid layout."
  },
  // 45
  {
    q: "45. Which HTML tag is used to add a video?",
    a: ["<video>","<media>","<movie>","<iframe>"],
    correct: 0,
    explanation: "video embeds video content."
  },
  // 46 input
  {
    q: "46. Write the CSS property for element transition effect:",
    input: true,
    correctInput: "transition",
    explanation: "`transition` defines CSS transition effects."
  },
  // 47 input
  {
    q: "47. Write the HTML attribute to define placeholder text in input:",
    input: true,
    correctInput: "placeholder",
    explanation: "`placeholder` shows hint text in input fields."
  },
  // 48
  {
    q: "48. Which CSS property changes the cursor on hover?",
    a: ["hover","cursor","pointer","mouse"],
    correct: 1,
    explanation: "`cursor` changes the mouse pointer style."
  },
  // 49 input
  {
    q: "49. Write the CSS property to make element text wrap within container:",
    input: true,
    correctInput: "word-wrap",
    explanation: "`word-wrap: break-word;` wraps text inside container."
  },
  // 50
  {
    q: "50. Write the HTML tag used to insert a line break in text:",
    input: true,
    correctInput: "br",
    explanation: "<br> inserts a line break."
  }
];

let current = 0;
let selected = null;
let score = 0;
let wrong = 0;
let answered = false;

function loadQuestion(){
  selected = null;
  answered = false;

  const q = quiz[current];
  document.getElementById("question").innerText = q.q;

  let optionsHTML = "";

  // Multiple-choice question
  if(q.a && q.a.length > 0){
    q.a.forEach((opt,index)=>{
      // Escape HTML so <nav>, <ul>, etc. appear as text
      const escapedOpt = opt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      optionsHTML += `<div class="option" onclick="selectOption(${index}, this)">${escapedOpt}</div>`;
    });
  }

  // Input-type question
  if(q.input){
    optionsHTML += `
      <input type="text" id="text-answer" placeholder="Type your answer here">
      <button class="btn" onclick="submitInput()">Submit Answer</button>
    `;
  }

  document.getElementById("options").innerHTML = optionsHTML;

  // Update progress bar
  document.getElementById("progress").style.width = ((current)/quiz.length)*100 + "%";
}

function submitInput(){
  if(answered) return;

  const inputBox = document.getElementById("text-answer");
  if(!inputBox) return;

  const userAnswer = inputBox.value.trim().toLowerCase();
  if(userAnswer === ""){
    alert("Please enter your answer before submitting.");
    return;
  }

  const correctAnswer = quiz[current].correctInput.toLowerCase();

  const character = document.getElementById("character");
  const reaction = document.getElementById("reaction");

  answered = true;

  if(userAnswer === correctAnswer){
    score++;
    character.textContent = "😄";
    character.classList.add("correct-anim");
    reaction.innerHTML = `Correct! You strike the enemy! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    character.classList.add("wrong-anim");
    reaction.innerHTML = `Wrong! You took damage! 💀<br><small>Correct answer: ${quiz[current].correctInput}<br>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  }, 300000);
}

function startGame(){
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  loadQuestion();
}

function goHome(){
  window.location.href = "landing.html";
}

function retryGame(){
  current = 0;
  score = 0;
  wrong = 0;
  selected = null;
  answered = false;

  document.querySelector(".game-box").innerHTML = `
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  `;

  loadQuestion();
}

function selectOption(index, el){
  if(answered) return;

  selected = index;
  answered = true;

  let options = document.querySelectorAll(".option");
  let character = document.getElementById("character");
  let reaction = document.getElementById("reaction");

  character.classList.remove("correct-anim","wrong-anim");

  options.forEach((opt,i)=>{
    opt.style.pointerEvents = "none";
    if(i === quiz[current].correct){
      opt.style.background = "#4CAF50";
      opt.style.color = "#fff";
    } else if(i === index){
      opt.style.background = "#ff4d4d";
      opt.style.color = "#fff";
    }
  });

  if(index === quiz[current].correct){
    score++;
    character.textContent = "😄";
    character.classList.add("correct-anim");
    reaction.innerHTML = `Correct! You strike the enemy! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    character.classList.add("wrong-anim");
    reaction.innerHTML = `Wrong! You took damage! 💀<br><small>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  },30000); // Give time for explanation to read
}

function nextQuestion(){
  if(!answered){
    alert("Choose your answer first!");
    return;
  }

  current++;

  if(current >= quiz.length){
    const pass = score >= 25;

    let resultHTML = `
      <h2>${pass ? "🗝️ Key Obtained! 🗝️" : "💀 Dungeon Failed 💀"}</h2>
      <p>✅ Correct: ${score}</p>
      <p>❌ Wrong: ${wrong}</p>
      <p>${pass ? "You may enter the next dungeon..." : "Score at least 25 to earn the key."}</p>
      <br>
      <button class="btn" onclick="retryGame()">🔁 Try Again</button>
      <a href="../landingpage2.html" class="btn">🏠 Home</a>
    `;

    document.querySelector(".game-box").innerHTML = resultHTML;
    return;
  }

  loadQuestion();
}

loadQuestion();
</script>


</body>
</html>
