<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Java Quiz</title>
<link rel="stylesheet" href="../GameCSS/dif.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="../Assets/video/blood.mp4" type="video/mp4">
</video>

<div id="home-screen" class="home-screen">
  <h1>🩸 Welcome to Java Inferno 🩸</h1>
  <p>Answer correctly to conquer all grueling 50 rooms and earn the key...</p>
  <button class="btn" onclick="startGame()">Start Adventure</button>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-box">
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  </div>
</div>


<script>

  // 1

  // 3

    q: "3. Which statement about abstract classes is true?",
    a: ["They cannot have constructors","They can be instantiated","They do not support inheritance","They must be final"],

  },
  // 4
  {
    q: "4. Which exception must be handled or declared in Java?",
    a: ["IOException","RuntimeException","ArithmeticException","NullPointerException"],
    correct: 0,
    explanation: "Checked exceptions like IOException must be handled or declared."
  },
  // 5 input
  {
    q: "5. Write the keyword used to define a method in Java:",
    input: true,
    correctInput: "void",
    explanation: "Methods are defined with a return type, `void` if no value is returned."
  },
  // 6 input
  {
    q: "6. What is the keyword used to inherit a class in Java?",
    input: true,
    correctInput: "extends",
    explanation: "The `extends` keyword allows a class to inherit another."
  },
  // 7 input
  {
    q: "7. Name the interface that represents a collection of key-value pairs.",
    input: true,
    correctInput: "Map",
    explanation: "The `Map` interface stores key-value mappings."
  },
  // 8
  {
    q: "8. What operator is used for logical AND in Java?",
    a: ["&&","&","||","!"],
    correct: 0,

  },
  // 9

    q: "9. What keyword prevents a class from being subclassed?",
    a: ["static","final","private","abstract"],
    correct: 1,

  },
  // 10 input
  {
    q: "10. Write the method signature for the main method in Java.",
    input: true,
    correctInput: "public static void main(String[] args)",

  },
  // 11
  {
    q: "11. Which loop guarantees execution at least once?",

    correct: 2,

  },
  // 12 input
  {
    q: "12. Write the keyword used to handle exceptions in Java:",
    input: true,
    correctInput: "try",

  },
  // 13
  {
    q: "13. Which method is automatically called before an object is destroyed?",
    a: ["finalize()","destroy()","main()","delete()"],
    correct: 0,

  },
  // 14 input
  {
    q: "14. Write the keyword that allows a class to implement an interface.",

    correctInput: "implements",

  {
    q: "15. What is the output type of Math.random()?",
    a: ["int","double","float","long"],
    correct: 1,

  },
  // 16 input
  {
    q: "16. Write the keyword used to declare a constant in Java:",
    input: true,
    correctInput: "final",

  },
  // 17
  {
    q: "17. Which collection preserves insertion order?",
    a: ["Set","List","Map","Queue"],
    correct: 1,
    explanation: "A `List` preserves insertion order."
  },
  // 18 input
  {
    q: "18. What is the keyword for a superclass constructor call?",
    input: true,
    correctInput: "super",

  },
  // 19 input
  {
    q: "19. Write the keyword used to declare an interface:",
    input: true,

    explanation: "Use `interface` to define an interface."
  },
  // 20
  {
    q: "20. Which of these is NOT a valid access modifier?",

    correct: 3,

  },
  // 21 input
  {
    q: "21. Write the keyword used to stop a loop immediately:",
    input: true,
    correctInput: "break",
    explanation: "`break` exits the current loop immediately."
  },
  // 22 input
  {
    q: "22. Write the keyword used to skip the current iteration:",
    input: true,

    explanation: "`continue` skips the rest of the loop iteration."
  },
  // 23
  {
    q: "23. Which operator compares object references?",
    a: ["==","equals()","!=","==="],
    correct: 0,
    explanation: "`==` checks object references, `equals()` checks content."
  },

  {

    input: true,

  },
  // 25 input
  {
    q: "25. Name the exception thrown when dividing by zero:",
    input: true,
    correctInput: "ArithmeticException",

  },
  // 26
  {
    q: "26. Which operator is used for bitwise OR?",
    a: ["|","||","&","&&"],
    correct: 0,
    explanation: "`|` is bitwise OR, `||` is logical OR."
  },
  // 27 input
  {
    q: "27. Keyword to declare a subclass constructor calling its superclass constructor:",
    input: true,
    correctInput: "super",
    explanation: "Use `super()` to call the parent constructor."
  },
  // 28
  {
    q: "28. Which data structure allows LIFO?",
    a: ["Queue","Stack","List","Map"],
    correct: 1,
    explanation: "Stack uses Last-In-First-Out order."
  },
  // 29 input
  {
    q: "29. Write the keyword to declare a method that cannot be overridden:",
    input: true,
    correctInput: "final",

  },
  // 30
  {
    q: "30. Which statement is true about interfaces?",
    a: ["They can have instance variables","They can have constructors","They support multiple inheritance","They can be final"],

  },

  {

  {
    q: "39. Which statement about String is correct?",
    a: ["Mutable","Immutable","Primitive","Object array"],
    correct: 1,
    explanation: "Strings are immutable; their values cannot be changed after creation."
  },
  // 40 input
  {
    q: "40. Keyword used to declare an abstract method:",
    input: true,
    correctInput: "abstract",
    explanation: "Use `abstract` to declare methods without implementation."
  },
  // 41 input
  {
    q: "41. Write the keyword for creating an object instance:",
    input: true,
    correctInput: "new",
    explanation: "`new` creates object instances in Java."
  },
  // 42
  {
    q: "42. Which operator compares primitive values?",
    a: ["==","equals()","===","="],
    correct: 0,
    explanation: "`==` compares primitive values."
  },
  // 43 input
  {
    q: "43. Keyword to stop a method execution and return a value:",
    input: true,
    correctInput: "return",
    explanation: "`return` ends method execution and optionally returns a value."
  },
  // 44 input
  {
    q: "44. Keyword to indicate code should be executed always after try-catch:",
    input: true,
    correctInput: "finally",
    explanation: "`finally` executes regardless of exceptions."
  },
  // 45
  {
    q: "45. Which keyword creates a subclass object?",
    a: ["new","extends","implements","super"],
    correct: 0,
    explanation: "`new` creates an object instance."
  },
  // 46 input
  {
    q: "46. Write the keyword for a synchronized block:",
    input: true,
    correctInput: "synchronized",
    explanation: "`synchronized` ensures exclusive thread access."
  },
  // 47
  {
    q: "47. Which method compares string contents?",
    a: ["==","equals()","compare()","match()"],
    correct: 1,
    explanation: "`equals()` compares string content."
  },
  // 48 input
  {
    q: "48. Keyword to declare a method that can throw exceptions:",
    input: true,
    correctInput: "throws",
    explanation: "Use `throws` in method signature to declare exceptions."
  },
  // 49 input
  {
    q: "49. Keyword to declare a package in Java:",
    input: true,
    correctInput: "package",
    explanation: "Use `package` to declare a Java package."
  },
  // 50
  {
    q: "50. Which is the default value of a boolean variable?",
    a: ["true","false","0","null"],
    correct: 1,
    explanation: "Default boolean value is `false`."
  }
];

let current = 0;
let selected = null;
let score = 0;
let wrong = 0;
let answered = false;

function loadQuestion(){
  selected = null;
  answered = false;

  const q = quiz[current];
  document.getElementById("question").innerText = q.q;

  let optionsHTML = "";

  // Multiple-choice question
  if(q.a && q.a.length > 0){
    q.a.forEach((opt,index)=>{
      // Escape HTML so <nav>, <ul>, etc. appear as text
      const escapedOpt = opt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      optionsHTML += `<div class="option" onclick="selectOption(${index}, this)">${escapedOpt}</div>`;
    });
  }

  // Input-type question
  if(q.input){
    optionsHTML += `
      <input type="text" id="text-answer" placeholder="Type your answer here">
      <button class="btn" onclick="submitInput()">Submit Answer</button>
    `;
  }

  document.getElementById("options").innerHTML = optionsHTML;

  // Update progress bar
  document.getElementById("progress").style.width = ((current)/quiz.length)*100 + "%";
}

function submitInput(){
  if(answered) return;
  const inputEl = document.getElementById("text-answer");
  if(!inputEl) return;

  const userInput = inputEl.value.trim();
  if(userInput === ""){
    alert("Please enter your answer before submitting.");
    return;
  }

  answered = true;

  if(userInput.toLowerCase() === quiz[current].correctInput.toLowerCase()){
    score++;
    document.getElementById("character").textContent = "😄";
    document.getElementById("reaction").innerHTML = `Correct! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    document.getElementById("character").textContent = "😡";
    document.getElementById("reaction").innerHTML = `Wrong! 💀<br><small>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    document.getElementById("character").textContent = "🧙";
    document.getElementById("reaction").textContent = "Next move...";
  },30000);
}

function startGame(){
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  loadQuestion();
}

function goHome(){
  window.location.href = "landing.html";
}

function retryGame(){
  current = 0;
  score = 0;
  wrong = 0;
  selected = null;
  answered = false;

  document.querySelector(".game-box").innerHTML = `
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  `;

  loadQuestion();
}

function selectOption(index, el){
  if(answered) return;

  selected = index;
  answered = true;

  let options = document.querySelectorAll(".option");
  let character = document.getElementById("character");
  let reaction = document.getElementById("reaction");

  character.classList.remove("correct-anim","wrong-anim");

  options.forEach((opt,i)=>{
    opt.style.pointerEvents = "none";
    if(i === quiz[current].correct){
      opt.style.background = "#4CAF50";
      opt.style.color = "#fff";
    } else if(i === index){
      opt.style.background = "#ff4d4d";
      opt.style.color = "#fff";
    }
  });

  if(index === quiz[current].correct){
    score++;
    character.textContent = "😄";
    character.classList.add("correct-anim");
    reaction.innerHTML = `Correct! You strike the enemy! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    character.classList.add("wrong-anim");
    reaction.innerHTML = `Wrong! You took damage! 💀<br><small>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  },30000); // Give time for explanation to read
}

function nextQuestion(){
  if(!answered){
    alert("Choose your answer first!");
    return;
  }

  current++;

  if(current >= quiz.length){
    const pass = score >= 25;

    let resultHTML = `
      <h2>${pass ? "🗝️ Key Obtained! 🗝️" : "💀 Dungeon Failed 💀"}</h2>
      <p>✅ Correct: ${score}</p>
      <p>❌ Wrong: ${wrong}</p>
      <p>${pass ? "You may enter the next dungeon..." : "Score at least 25 to earn the key."}</p>
      <br>
      <button class="btn" onclick="retryGame()">🔁 Try Again</button>
      <a href="../landingpage2.html" class="btn">🏠 Home</a>
    `;

    document.querySelector(".game-box").innerHTML = resultHTML;
    return;
  }

  loadQuestion();
}

loadQuestion();
</script>


</body>
</html>
