<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon C++ Quiz</title>
<link rel="stylesheet" href="../GameCSS/dref.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="../Assets/video/castle.mp4" type="video/mp4">
</video>

<div id="home-screen" class="home-screen">
  <h1>🦇 Welcome to C++ Castle 🦇</h1>
  <p>Answer correctly to conquer all grueling 50 rooms and earn the key...</p>
  <button class="btn" onclick="startGame()">Start Adventure</button>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-box">
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  </div>
</div>

  },
  // 8
  {
    q: "8. What is the output of sizeof(int) on most 64-bit systems?",

    correct: 1,

  },
  // 9 input
  {
    q: "9. Write the syntax to include the vector header file:",
    input: true,
    correctInput: "#include <vector>",

  },
  // 41 input
  {
    q: "41. Write the C++ statement to create a const reference to an int x:",
    input: true,
    correctInput: "const int& ref = x;",
    explanation: "const int& ref = x; creates a const reference."
  },
  // 42
  {
    q: "42. Which operator is used for conditional evaluation (ternary)?",
    a: ["? :", "?:", "if else", "??"],
    correct: 1,
    explanation: "?: is the ternary operator."
  },
  // 43 input
  {
    q: "43. Write the syntax to declare a two-dimensional array of integers 3x3:",
    input: true,
    correctInput: "int arr[3][3];",
    explanation: "Use int arr[3][3]; to declare 2D array."
  },
  // 44 input
  {
    q: "44. Write the keyword to define a static member in class:",
    input: true,
    correctInput: "static",

  },
  // 45
  {
    q: "45. Which of these is the correct syntax for switch-case in C++?",
    a: ["switch(x){case 1: break;}","switch x {case 1: break;}","switch(x) case 1: break;","switch(x): case 1; break;"],

  // 46 input
  {
    q: "46. Write the C++ statement to read an integer from user input:",

  // 48
  {
    q: "48. Which operator is used to access the address of a variable?",

    correct: 1,

  },
  // 49 input
  {

  // 50 input
  {
    q: "50. Write the keyword used to declare a namespace:",

];

let current = 0;
let selected = null;
let score = 0;
let wrong = 0;
let answered = false;

function loadQuestion(){
  selected = null;
  answered = false;

  const q = quiz[current];
  document.getElementById("question").innerText = q.q;

  let optionsHTML = "";

  // Multiple-choice options
  if(q.a && q.a.length > 0){
    q.a.forEach((opt,index)=>{
      const escapedOpt = opt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      optionsHTML += `<div class="option" onclick="selectOption(${index}, this)">${escapedOpt}</div>`;
    });
  }

  // Input question
  if(q.input){
    optionsHTML += `
      <input type="text" id="text-answer" placeholder="Type your answer here">
      <button class="btn" onclick="submitInput()">Submit Answer</button>
    `;
  }

  document.getElementById("options").innerHTML = optionsHTML;

  // Progress bar
  document.getElementById("progress").style.width = ((current)/quiz.length)*100 + "%";
}

function submitInput(){
  if(answered) return; // prevent multiple submissions

  const q = quiz[current];
  const inputBox = document.getElementById("text-answer");

  if(!inputBox) return; // safety check

  const userAnswer = inputBox.value.trim().toLowerCase();
  if(userAnswer === ""){
    alert("Please enter your answer before submitting.");
    return;
  }

  const correctAnswer = q.correctInput.toLowerCase();

  const character = document.getElementById("character");
  const reaction = document.getElementById("reaction");

  answered = true;

  if(userAnswer === correctAnswer){
    score++;
    character.textContent = "😄";
    character.classList.add("correct-anim");
    reaction.innerHTML = `Correct! You strike the enemy! ⚔️<br><small>${q.explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    character.classList.add("wrong-anim");
    reaction.innerHTML = `Wrong! You took damage! 💀<br><small>Correct answer: ${q.correctInput}<br>${q.explanation}</small>`;
  }

  // Reset character after a short delay
  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  }, 3000); // shorter delay so it’s playable
}

function startGame(){
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  loadQuestion();
}

function goHome(){
  window.location.href = "landing.html";
}

function retryGame(){
  current = 0;
  score = 0;
  wrong = 0;
  selected = null;
  answered = false;

  document.querySelector(".game-box").innerHTML = `
    <h2>Dungeon Quiz</h2>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  `;

  loadQuestion();
}

function selectOption(index, el){
  if(answered) return;

  selected = index;
  answered = true;

  let options = document.querySelectorAll(".option");
  let character = document.getElementById("character");
  let reaction = document.getElementById("reaction");

  character.classList.remove("correct-anim","wrong-anim");

  options.forEach((opt,i)=>{
    opt.style.pointerEvents = "none";
    if(i === quiz[current].correct){
      opt.style.background = "#4CAF50";
      opt.style.color = "#fff";
    } else if(i === index){
      opt.style.background = "#ff4d4d";
      opt.style.color = "#fff";
    }
  });

  if(index === quiz[current].correct){
    score++;
    character.textContent = "😄";
    character.classList.add("correct-anim");
    reaction.innerHTML = `Correct! You strike the enemy! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    character.classList.add("wrong-anim");
    reaction.innerHTML = `Wrong! You took damage! 💀<br><small>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  },300000); // Give time for explanation to read
}

function nextQuestion(){
  if(!answered){
    alert("Choose your answer first!");
    return;
  }

  current++;

  if(current >= quiz.length){
    const pass = score >= 25;

    let resultHTML = `
      <h2>${pass ? "🗝️ Key Obtained! 🗝️" : "💀 Dungeon Failed 💀"}</h2>
      <p>✅ Correct: ${score}</p>
      <p>❌ Wrong: ${wrong}</p>
      <p>${pass ? "You may enter the next dungeon..." : "Score at least 25 to earn the key."}</p>
      <br>
      <button class="btn" onclick="retryGame()">🔁 Try Again</button>
      <a href="../landingpage2.html" class="btn">🏠 Home</a>
    `;

    document.querySelector(".game-box").innerHTML = resultHTML;
    return;
  }

  loadQuestion();
}

loadQuestion();
</script>


</body>
</html>
