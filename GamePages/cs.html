<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Dungeon Quiz</title>
<link rel="stylesheet" href="../GameCSS/game4.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

<video autoplay muted loop id="bg-video">
  <source src="../Assets/video/hro.mp4" type="video/mp4">
</video>

<div id="home-screen" class="home-screen">
  <h1>☀️ Welcome to CSS viescape ☀️</h1>
  <p>Answer correctly to conquer all 20 rooms and earn the key...</p>
  <button class="btn" onclick="startGame()">Start Adventure</button>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-box">
    <h2>HTML Dungeon Quiz</h2>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="player-ui">
      <div id="character">🧙</div>
      <div id="reaction">Ready...</div>
    </div>

    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next Room →</button>
  </div>
</div>

<script>

const quiz = [
{
q:"1. What does CSS stand for?",
a:["Computer Style Sheets","Cascading Style Sheets","Creative Style System"],
correct:1,
explanation:"CSS stands for Cascading Style Sheets, used to style HTML elements."
},
{
q:"2. Which property changes text color?",
a:["font-color","text-color","color"],
correct:2,
explanation:"The color property sets the color of text."
},
{
q:"3. Which property changes background color?",
a:["bgcolor","background-color","color"],
correct:1,
explanation:"background-color sets the background color of an element."
},
{
q:"4. How do you select a class?",
a:["#name",".name","name"],
correct:1,
explanation:"A class selector uses a dot (.) followed by the class name."
},
{
q:"5. How do you select an ID?",
a:[".id","#id","id"],
correct:1,
explanation:"An ID selector uses a hash (#) symbol."
},
{
q:"6. Which property controls text size?",
a:["font-style","text-size","font-size"],
correct:2,
explanation:"font-size changes the size of text."
},
{
q:"7. Which property adds space inside an element?",
a:["margin","padding","border"],
correct:1,
explanation:"padding controls the space inside the element."
},
{
q:"8. Which property adds space outside an element?",
a:["margin","padding","spacing"],
correct:0,
explanation:"margin controls space outside the element."
},
{
q:"9. Which property makes text bold?",
a:["font-weight","text-bold","bold"],
correct:0,
explanation:"font-weight: bold; makes text bold."
},
{
q:"10. Which value centers text?",
a:["left","center","right"],
correct:1,
explanation:"text-align: center; centers text horizontally."
},
{
q:"11. Which property is used for borders?",
a:["border","outline","frame"],
correct:0,
explanation:"The border property defines the border of an element."
},
{
q:"12. Which display value makes elements inline?",
a:["block","inline","flex"],
correct:1,
explanation:"display: inline; makes elements appear in a line."
},
{
q:"13. Which display value uses flexbox?",
a:["grid","flex","inline"],
correct:1,
explanation:"display: flex; enables flexbox layout."
},
{
q:"14. Which property controls element width?",
a:["size","width","length"],
correct:1,
explanation:"width defines how wide an element is."
},
{
q:"15. Which property controls element height?",
a:["height","size","length"],
correct:0,
explanation:"height defines how tall an element is."
},
{
q:"16. Which position value is default?",
a:["relative","absolute","static"],
correct:2,
explanation:"position: static; is the default positioning."
},
{
q:"17. Which property controls layering?",
a:["z-index","layer","depth"],
correct:0,
explanation:"z-index controls the vertical stacking order."
},
{
q:"18. Which unit is relative?",
a:["px","em","cm"],
correct:1,
explanation:"em is a relative unit based on font size."
},
{
q:"19. Which property adds shadow to text?",
a:["text-shadow","font-shadow","shadow"],
correct:0,
explanation:"text-shadow adds shadow effects to text."
},
{
q:"20. Which property rounds corners?",
a:["corner-radius","border-round","border-radius"],
correct:2,
explanation:"border-radius rounds the corners of elements."
}
];

let current = 0;
let score = 0;
let wrong = 0;
let answered = false;

function loadQuestion(){
  answered = false;

  document.getElementById("question").innerText = quiz[current].q;

  let optionsHTML = "";
  quiz[current].a.forEach((opt,index)=>{
    optionsHTML += `<div class="option" onclick="selectOption(${index}, this)">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;

  document.getElementById("progress").style.width =
  ((current)/quiz.length)*100 + "%";
}

function startGame(){
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  loadQuestion();
}

function selectOption(index,el){
  if(answered) return;

  answered = true;

  let options = document.querySelectorAll(".option");
  let character = document.getElementById("character");
  let reaction = document.getElementById("reaction");

  options.forEach((opt,i)=>{
    opt.style.pointerEvents = "none";
    if(i === quiz[current].correct){
      opt.style.background = "#4CAF50";
      opt.style.color = "#fff";
    } else if(i === index){
      opt.style.background = "#ff4d4d";
      opt.style.color = "#fff";
    }
  });

  if(index === quiz[current].correct){
    score++;
    character.textContent = "😄";
    reaction.innerHTML = `Correct! ⚔️<br><small>${quiz[current].explanation}</small>`;
  } else {
    wrong++;
    character.textContent = "😡";
    reaction.innerHTML = `Wrong! 💀<br><small>${quiz[current].explanation}</small>`;
  }

  setTimeout(()=>{
    character.textContent = "🧙";
    reaction.textContent = "Next move...";
  },300000);
}

function nextQuestion(){
  if(!answered){
    alert("Choose your answer first!");
    return;
  }

  current++;

  if(current >= quiz.length){
    const pass = score >= 15;

    document.querySelector(".game-box").innerHTML = `
      <h2>${pass ? "🗝️ Key Obtained! 🗝️" : "💀 Dungeon Failed 💀"}</h2>
      <p>✅ Correct: ${score}</p>
      <p>❌ Wrong: ${wrong}</p>
      <p>${pass ? "You may enter the next dungeon..." : "Score at least 15 to pass."}</p>
      <br>
      <button class="btn" onclick="location.reload()">🔁 Try Again</button>
      <a href="../landingpage2.html" class="btn">🏠 Home</a>
    `;
    return;
  }

  loadQuestion();
}

</script>

</body>
</html>
